<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mis Tareas - Gestor de Tareas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Gestor de Tareas</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/logout}">Cerrar Sesión</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Mis Actividades</h2>
        <a th:href="@{/tasks/new}" class="btn btn-primary">Nueva Tarea</a>
    </div>

    <div class="table-responsive">
        <table class="table table-hover bg-white shadow-sm rounded">
            <thead class="table-dark">
            <tr>
                <th>Título</th>
                <th>Descripción</th>
                <th>Vencimiento</th>
                <th>Prioridad</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="task : ${tasks}">
                <td th:text="${task.title}"></td>
                <td th:text="${task.description}"></td>
                <td th:text="${task.dueDate}"></td>
                <td>
                    <span th:class="${task.priority == 'Alta' ? 'badge bg-danger' : (task.priority == 'Media' ? 'badge bg-warning' : 'badge bg-info')}"
                          th:text="${task.priority}"></span>
                </td>
                <td>
                    <a th:href="@{/tasks/edit/{id}(id=${task.id})}" class="btn btn-sm btn-outline-warning">Editar</a>
                    <a th:href="@{/tasks/delete/{id}(id=${task.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Seguro?')">Eliminar</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(tasks)}">
                <td colspan="5" class="text-center">No hay tareas registradas.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
